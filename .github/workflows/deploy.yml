name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Banana Pi
    runs-on: self-hosted
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build backend
        working-directory: backend
        run: |
          dotnet restore
          dotnet publish -c Release --no-restore --self-contained false -o publish

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Deploy backend
        run: |
          sudo systemctl stop car-booking
          sudo rsync -a --delete backend/publish/ /opt/car-booking/
          sudo chown -R www-data:www-data /opt/car-booking
          sudo systemctl start car-booking

      - name: Deploy frontend
        run: |
          sudo rsync -a --delete frontend/dist/ /var/www/car-booking/
          sudo chown -R www-data:www-data /var/www/car-booking

      - name: Health check
        run: |
          for i in $(seq 1 10); do
            if curl -fsS http://127.0.0.1:5000/health > /dev/null; then
              echo "Service healthy."
              exit 0
            fi
            echo "Waiting for service... ($i/10)"
            sleep 3
          done
          echo "Health check failed — rolling back is manual." >&2
          sudo systemctl status car-booking --no-pager || true
          exit 1
