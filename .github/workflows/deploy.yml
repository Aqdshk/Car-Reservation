name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Banana Pi
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: [self-hosted, banana-pi]
    environment: production
    steps:
      - name: Resolve CI run id
        id: ci
        uses: actions/github-script@v7
        with:
          script: |
            if (context.eventName === 'workflow_run') {
              return context.payload.workflow_run.id;
            }
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'ci.yml',
              branch: 'main',
              status: 'success',
              per_page: 1,
            });
            if (!runs.data.workflow_runs.length) {
              throw new Error('No successful CI run found on main.');
            }
            return runs.data.workflow_runs[0].id;
          result-encoding: string

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-publish
          path: backend-publish
          run-id: ${{ steps.ci.outputs.result }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend-dist
          run-id: ${{ steps.ci.outputs.result }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy backend
        run: |
          sudo systemctl stop car-booking
          sudo rsync -a --delete backend-publish/ /opt/car-booking/
          sudo chown -R www-data:www-data /opt/car-booking
          sudo systemctl start car-booking

      - name: Deploy frontend
        run: |
          sudo rsync -a --delete frontend-dist/ /var/www/car-booking/
          sudo chown -R www-data:www-data /var/www/car-booking

      - name: Health check
        run: |
          for i in $(seq 1 10); do
            if curl -fsS http://127.0.0.1:5000/health > /dev/null; then
              echo "Service healthy."
              exit 0
            fi
            echo "Waiting for service... ($i/10)"
            sleep 3
          done
          echo "Health check failed." >&2
          sudo systemctl status car-booking --no-pager || true
          exit 1
